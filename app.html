function _supaFetch(url, opts) {
  opts = opts || {};
  const headers = new Headers(opts.headers || {});
  headers.set('apikey', SUPA_KEY);
  headers.set('Authorization', 'Bearer ' + _cachedToken);

function supa(table) {
  const BASE = SUPA_URL + '/rest/v1/' + table;
  function buildUrl(params) { return BASE + (params.length ? '?' + params.join('&') : ''); }
  async function exec(method, params, body, prefer) {
    const opts = { method };
    if (prefer) { const h = new Headers(); h.set('Prefer', prefer); opts.headers = h; }
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await _supaFetch(buildUrl(params), opts);
    let data = null;
    if (res.status !== 204) { try { data = await res.json(); } catch(e){} }
    if (!res.ok) return { data: null, error: { message: (data&&data.message)||'Error '+res.status } };
    return { data: data, error: null };
  }
  function selectQuery(cols, params) {
    params = params || ['select='+cols];
    const q = {
      eq(col, val) { params.push(col+'=eq.'+encodeURIComponent(val)); return q; },
      single() { return { then(r,j){ return exec('GET',params).then(res=>{ if(res.error) return r({data:null,error:res.error}); const row=Array.isArray(res.data)?(res.data[0]||null):res.data; return r({data:row,error:row?null:{message:'No rows'}}); },j); } }; },
      then(r, j) { return exec('GET', params).then(res=>{ if(res.error) return r(res); const d=Array.isArray(res.data)?res.data:(res.data?[res.data]:[]); return r({data:d,error:null}); }, j); }
    };
    return q;
  }
  return {
    select(cols) { return selectQuery(cols); },
    insert(body) { return { then(r,j){ return exec('POST',[],body,'return=representation').then(r,j); } }; },
    update(body) { const params=[]; return { eq(col,val){ params.push(col+'=eq.'+encodeURIComponent(val)); return { then(r,j){ return exec('PATCH',params,body,'return=representation').then(r,j); } }; } }; },
  };
}

function switchAuth(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-register').classList.toggle('active',mode==='register');
  document.getElementById('auth-btn').textContent=mode==='login'?'Sign In':'Register';
}

async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const password=document.getElementById('auth-password').value.trim();
  const msg=document.getElementById('auth-msg');
  const btn=document.getElementById('auth-btn');
  if(!email||!password){msg.textContent='Please enter email and password.';msg.className='auth-msg error';return;}
  btn.disabled=true;msg.textContent='Processing...';
  try{
    let res;
    if(authMode==='register'){
      res=await db.auth.signUp({email,password});
      if(res.error)throw res.error;
      msg.textContent='✅ Registration successful! Please check your email.';
      msg.className='auth-msg success';
    } else {
      res=await db.auth.signInWithPassword({email,password});
      if(res.error)throw res.error;
      currentUser=res.data.user;
      if(res.data.session?.access_token) _cachedToken = res.data.session.access_token;
      showApp();
    }
  }catch(e){
    let errMsg = e.message;
    if(errMsg.includes('Invalid login credentials')) errMsg = 'Wrong email or password.';
    else if(errMsg.includes('Email not confirmed')) errMsg = 'Please confirm your email.';
    msg.textContent = errMsg;
    msg.className='auth-msg error';
  }
  btn.disabled=false;
}

async function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('main-nav').style.display='flex';
  document.getElementById('chat-page').style.display='flex';
  document.getElementById('chat-area-wrap').style.display='flex';
  document.getElementById('avatar-stage').style.display='flex';
  if(currentUser){
    const email=currentUser.email;
    loadProfile();
    loadTokens();
  }
  // Show avatar grid
  showAvatarGrid();

window.addEventListener('DOMContentLoaded', async function() {
  try {
    const { data } = await db.auth.getSession();
    if(data && data.session && data.session.user) {
      currentUser = data.session.user;
      _cachedToken = data.session.access_token || SUPA_KEY;
      showApp();
    } else {
      document.getElementById('auth-screen').style.display='flex';
    }
  } catch(e){
    document.getElementById('auth-screen').style.display='flex';
  }
  db.auth.onAuthStateChange(function(event, session) {
    if((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
      currentUser = session.user;
      _cachedToken = session.access_token || SUPA_KEY;
    } else if(event === 'SIGNED_OUT') {
      currentUser = null;
      _cachedToken = SUPA_KEY;
    }
  });
});

function parseMarkdown(text){
  if(!text) return '';
  let h = text;
  h = h.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  h = h.replace(/\*\*([^*]+)\*\*/g,'<span class="ai-highlight">$1</span>');
  h = h.replace(/\n/g,'<br>');
  return h;
}

function addMsg(role,text){
  const av=AVATARS[current];
  const msgs=document.getElementById('messages');
  const row=document.createElement('div');
  row.className='msg-row'+(role==='user'?' user':'');
  if(role==='ai'){
    const w=document.createElement('div');
    w.className='msg-av-s';
    setImg(w,av.img,av.name);
    row.appendChild(w);
  }
  const b=document.createElement('div');
  b.className='bubble '+role;
  const span=document.createElement('span');
  span.innerHTML=parseMarkdown(text);
  b.appendChild(span);
  if(role==='ai'){
    const sb=document.createElement('button');
    sb.className='speak-btn';
    sb.textContent='🔊';
    b.appendChild(sb);
    const cb=document.createElement('button');
    cb.className='copy-msg-btn';
    cb.textContent='Copy';
    cb.onclick=()=>{
      const plainText=text.replace(/\*\*([^*]+)\*\*/g,'$1');
      navigator.clipboard.writeText(plainText);
      cb.textContent='✓';
      setTimeout(()=>cb.textContent='Copy',2000);
    };
    b.appendChild(cb);
  }
  row.appendChild(b);
  if(role==='user'){
    const ic=document.createElement('div');
    ic.className='msg-user-icon';
    ic.textContent='You';
    row.appendChild(ic);
  }
  msgs.appendChild(row);
  msgs.scrollTop=msgs.scrollHeight;
}

async function sendMsg(){
  const inp=document.getElementById('msg-input');
  const text=inp.value.trim();
  if(!text) return;
  
  inp.value='';
  document.getElementById('send-btn').disabled=true;
  
  addMsgWithImage('user', text, null);
  
  history[current].push({role:'user', content: text});
  
  document.getElementById('send-btn').classList.add('loading');
  addTyping();
  
  try{
    const av=AVATARS[current];
    const sysMap = {
      'en': av.systemEN || av.system,
      'mk': av.system,
      'sr': av.systemSR || av.system,
    };
    const baseSys = sysMap[lang] || av.system;
    const sys = baseSys;
    
    const payload = {
      model: 'gemini-2.5-flash',
      max_tokens: 2000,
      system: sys,
      messages: history[current].slice(-10).map(m => ({ role: m.role, content: m.content })),
      avatar: current,
      plan: 'free',
      lang: lang
    };
    
    const res = await fetch('https://marginova.tech/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    let data = await res.json();
    removeTyping();
    if(data.error){
      addMsg('ai','⚠️ '+(data.error.message||'An error occurred.'));
    } else {
      const reply = data.content[0].text;
      history[current].push({role:'assistant', content: reply});
      addMsg('ai', reply);
    }
  } catch(e){
    removeTyping();
    addMsg('ai','⚠️ Unable to connect. Please try again.');
  }
  document.getElementById('send-btn').classList.remove('loading');
  document.getElementById('send-btn').disabled=false;
  inp.focus();
}
